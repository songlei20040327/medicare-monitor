<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Medicare Mobile ICU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">
    
    <nav class="bg-white border-b p-4 flex justify-between items-center shrink-0 shadow-sm z-20">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-microchip text-orange-500 text-xl"></i>
            <h1 class="text-xl font-black">Medicare <span class="text-slate-400 font-medium">Monitor</span></h1>
        </div>
        <button id="btn-connect" class="bg-orange-500 text-white px-5 py-2 rounded-2xl font-bold shadow-lg shadow-orange-200 active:scale-95 transition-transform flex items-center">
            <i class="fa-brands fa-bluetooth-b mr-1.5"></i><span id="ble-status">Connect</span>
        </button>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex items-center gap-4">
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=SongLei" class="w-14 h-14 rounded-full bg-orange-50 border border-orange-100">
            <div>
                <h2 class="text-lg font-bold">宋磊 <span class="text-xs font-medium text-slate-400 ml-1">主任医师</span></h2>
                <p id="realtime-clock" class="text-sm font-mono text-slate-400 tracking-widest mt-0.5">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm flex items-center gap-3">
                <i class="fa-solid fa-temperature-three-quarters text-rose-400 text-xl"></i>
                <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">温度</p><p class="text-lg font-black"><span id="val-temp">--</span><span class="text-xs text-slate-400 ml-0.5">°C</span></p></div>
            </div>
            <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm flex items-center gap-3">
                <i class="fa-solid fa-droplet text-blue-400 text-xl"></i>
                <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">湿度</p><p class="text-lg font-black"><span id="val-hum">--</span><span class="text-xs text-slate-400 ml-0.5">%</span></p></div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="bg-white rounded-2xl p-2 border border-slate-100 shadow-sm relative aspect-square">
                <span class="absolute top-2 left-2 text-[10px] font-bold text-slate-300 tracking-widest">SpO2</span>
                <div id="ring-spo2" class="w-full h-full pt-2"></div>
            </div>
            <div class="bg-white rounded-2xl p-2 border border-slate-100 shadow-sm relative aspect-square">
                <span class="absolute top-2 left-2 text-[10px] font-bold text-slate-300 tracking-widest">EtCO2</span>
                <div id="ring-co2" class="w-full h-full pt-2"></div>
            </div>
            <div class="bg-white rounded-2xl p-2 border border-slate-100 shadow-sm relative aspect-square">
                <span class="absolute top-2 left-2 text-[10px] font-bold text-slate-300 tracking-widest">FiO2</span>
                <div id="ring-o2" class="w-full h-full pt-2"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div id="block-hr" class="bg-white rounded-3xl p-5 shadow-sm flex flex-col justify-between h-28 border-l-4 border-y border-r border-slate-100 border-l-pink-400 transition-all">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">心率</span>
                <p class="text-3xl font-black text-slate-800"><span id="val-hr">--</span> <span class="text-xs font-bold text-slate-400">BPM</span></p>
            </div>
            <div id="block-rr" class="bg-white rounded-3xl p-5 shadow-sm flex flex-col justify-between h-28 border-l-4 border-y border-r border-slate-100 border-l-blue-400 transition-all">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">呼吸频率</span>
                <p class="text-3xl font-black text-slate-800"><span id="val-rr">--</span> <span class="text-xs font-bold text-slate-400">RPM</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div id="block-peep" class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">PEEP</p>
                <p class="text-xl font-black mt-1"><span id="val-peep">--</span> <span class="text-[10px] text-slate-400">kPa</span></p>
            </div>
            <div id="block-flow" class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm transition-all">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">实时流量</p>
                <p class="text-xl font-black mt-1"><span id="val-flow">--</span> <span class="text-[10px] text-slate-400">L/m</span></p>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-4 border border-slate-100 shadow-sm relative flex flex-col h-48">
            <h3 class="text-[10px] font-bold text-rose-400 z-10 uppercase tracking-widest mb-1"><i class="fa-solid fa-wave-square mr-1"></i>PPG 波形</h3>
            <div id="chart-ppg" class="w-full flex-1"></div>
        </div>
        <div class="bg-white rounded-3xl p-4 border border-slate-100 shadow-sm relative flex flex-col h-48">
            <h3 class="text-[10px] font-bold text-orange-400 z-10 uppercase tracking-widest mb-1"><i class="fa-solid fa-wind mr-1"></i>气道压力</h3>
            <div id="chart-press" class="w-full flex-1"></div>
        </div>
        
        <div class="h-8"></div> </main>

    <script src="app.js"></script>
</body>
</html>
